<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sachin Portfolio</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
scroll-behavior:smooth;
}

body{
background:#0f0f1a;
color:white;
}

/* Navbar */
nav{
position:fixed;
top:0;
width:100%;
display:flex;
justify-content:space-between;
padding:15px 20px;
background:rgba(0,0,0,0.6);
backdrop-filter:blur(10px);
z-index:1000;
}

nav h3{color:#00f7ff;}

nav a{
color:white;
margin-left:15px;
text-decoration:none;
transition:0.3s;
}
nav a:hover{color:#00f7ff}

/* Hero */
.hero{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
background:linear-gradient(135deg,#667eea,#764ba2);
}

.hero h1{
font-size:40px;
margin-bottom:10px;
}

.btn{
padding:12px 25px;
border:none;
border-radius:30px;
background:white;
color:#764ba2;
cursor:pointer;
margin-top:15px;
transition:0.3s;
}
.btn:hover{
background:#00f7ff;
color:black;
}

/* Sections */
section{
padding:80px 20px;
text-align:center;
}

/* Skills */
.bar{
background:#333;
border-radius:20px;
margin:10px auto;
width:80%;
}
.fill{
background:#00f7ff;
padding:5px;
border-radius:20px;
}

/* Projects */
.projects{
display:flex;
flex-wrap:wrap;
gap:15px;
justify-content:center;
}
.card{
background:#1a1a2e;
padding:20px;
border-radius:10px;
width:180px;
transition:0.3s;
}
.card:hover{
transform:scale(1.1);
background:#00f7ff;
color:black;
}

/* Contact */
#contact input, #contact textarea{
width:80%;
padding:10px;
margin:5px;
border:none;
border-radius:5px;
}

/* WhatsApp */
.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
padding:15px;
border-radius:50%;
color:white;
font-size:20px;
text-decoration:none;
}

/* Footer */
footer{
background:black;
padding:15px;
}

</style>
</head>

<body>

<nav>
<h3>Sachin</h3>
<div>
<a href="#">Home</a>
<a href="#about">About</a>
<a href="#skills">Skills</a>
<a href="#projects">Projects</a>
<a href="#contact">Contact</a>
</div>
</nav>

<!-- HERO -->
<div class="hero">
<div>
<h1>Hi, I'm Sachin 🔥</h1>
<p>I create powerful websites 🚀</p>
<button class="btn" onclick="go('about')">Explore</button>
</div>
</div>

<!-- ABOUT -->
<section id="about">
<h2>About Me</h2>
<p>मैं एक web developer हूँ और modern website बनाता हूँ 💻🔥</p>
</section>

<!-- SKILLS -->
<section id="skills">
<h2>Skills</h2>

<p>HTML</p>
<div class="bar"><div class="fill" style="width:90%"></div></div>

<p>CSS</p>
<div class="bar"><div class="fill" style="width:80%"></div></div>

<p>JavaScript</p>
<div class="bar"><div class="fill" style="width:70%"></div></div>

</section>

<!-- PROJECTS -->
<section id="projects">
<h2>Projects</h2>

<div class="projects">
<div class="card">Portfolio</div>
<div class="card">Business Site</div>
<div class="card">Landing Page</div>
</div>

</section>

<!-- CONTACT -->
<section id="contact">
<h2>Contact Me</h2>

<input type="text" placeholder="Your Name"><br>
<input type="email" placeholder="Your Email"><br>
<textarea placeholder="Message"></textarea><br>

<button class="btn" onclick="sendMsg()">Send Message</button>
</section>

<!-- FOOTER -->
<footer>
<p>© 2026 Sachin | Made with ❤️</p>
</footer>

<!-- WhatsApp -->
<a class="whatsapp" href="https://wa.me/917991901145?text=Hello%20Sachin%20I%20want%20a%20website">💬</a>

<script>
function go(id){
document.getElementById(id).scrollIntoView({behavior:'smooth'});
}

function sendMsg(){
alert("Message feature coming soon 😎");
}
</script>

</body>
</html>
