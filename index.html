<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sachin Web Services</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Pacifico&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Orbitron', sans-serif;
scroll-behavior:smooth;
}

body{
color:white;
background:#0a0a0a;
}

/* NAVBAR */
nav{
position:fixed;
top:0;
width:100%;
display:flex;
justify-content:space-between;
padding:15px 20px;
background:rgba(0,0,0,0.6);
backdrop-filter:blur(10px);
z-index:1000;
}

nav h2{
font-family:'Pacifico', cursive;
color:#00f7ff;
text-shadow:0 0 15px #00f7ff, 0 0 30px #00f7ff;
}

nav a{
color:white;
margin-left:15px;
text-decoration:none;
text-shadow:0 0 10px #00f7ff;
}

/* HERO (FIXED CLEAN BACKGROUND) */
.hero{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
background:
linear-gradient(rgba(255,255,255,0.3),rgba(255,255,255,0.3)),
url('https://images.unsplash.com/photo-1522202176988-66273c2fd55f');
background-size:cover;
background-position:center;
}

.hero h1{
font-size:40px;
font-style:italic;
color:#000;
text-shadow:0 0 20px #00f7ff;
}

.hero p{
margin-top:10px;
color:#000;
text-shadow:0 0 10px #00f7ff;
}

/* BUTTON */
.btn{
padding:12px 25px;
border:none;
border-radius:30px;
background:#00f7ff;
color:black;
cursor:pointer;
margin-top:15px;
font-weight:bold;
box-shadow:0 0 15px #00f7ff, 0 0 30px #00f7ff;
transition:0.3s;
}

.btn:hover{
transform:scale(1.05);
box-shadow:0 0 25px #00f7ff, 0 0 50px #00f7ff;
}

/* SECTION */
section{
padding:80px 20px;
text-align:center;
}

/* BUY SECTION */
.buy-box{
background:#111;
padding:30px;
border-radius:15px;
box-shadow:0 0 25px #00f7ff33;
}

.price{
font-size:30px;
color:#00f7ff;
text-shadow:0 0 20px #00f7ff, 0 0 40px #00f7ff;
}

/* ANIME */
.anime{
background:
linear-gradient(rgba(0,0,0,0.7),rgba(0,0,0,0.9)),
url('https://wallpaperaccess.com/full/6105834.jpg');
background-size:cover;
background-position:center;
padding:100px 20px;
position:relative;
}

.anime::before{
content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:radial-gradient(circle, rgba(255,255,0,0.15), transparent);
animation:lightning 2s infinite;
}

@keyframes lightning{
0%{opacity:0.2;}
50%{opacity:0.6;}
100%{opacity:0.2;}
}

/* INPUT */
input,textarea{
width:90%;
padding:12px;
margin:10px;
border:none;
border-radius:10px;
background:rgba(255,255,255,0.1);
color:white;
backdrop-filter:blur(10px);
border:1px solid rgba(255,255,255,0.2);
}

/* WHATSAPP */
.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
padding:15px;
border-radius:50%;
text-decoration:none;
color:white;
font-size:20px;
box-shadow:0 0 15px #25D366;
}

</style>
</head>

<body>

<nav>
<h2>Sachin</h2>
<div>
<a href="#">Home</a>
<a href="#buy">Buy</a>
<a href="#contact">Contact</a>
</div>
</nav>

<div class="hero">
<div>
<h1>Build Websites for You 💻🔥</h1>
<p>Get your business online fast 🚀</p>
<button class="btn" onclick="go('buy')">Order Now</button>
</div>
</div>

<section id="buy">
<h2 style="text-shadow:0 0 15px #00f7ff;">Buy Website</h2>

<div class="buy-box">
<p>Professional Website</p>
<div class="price">₹3.5k – ₹7k</div>
<p>Fast Delivery + Premium Design</p>
</div>

<br>

<a class="btn" href="https://wa.me/917991901145?text=I%20want%20a%20website">Order on WhatsApp</a>

<br><br>

<a class="btn" href="upi://pay?pa=7991901145@ybl&pn=Sachin&am=6500&cu=INR">
Pay ₹6500 via UPI
</a>

</section>

<section class="anime" id="contact">
<h2 style="text-shadow:0 0 20px #00f7ff;">Contact Me</h2>

<input type="text" placeholder="Your Name">
<input type="text" placeholder="Website Type">
<textarea placeholder="Your Message"></textarea>

<br>
<button class="btn">Send</button>

</section>

<a class="whatsapp" href="https://wa.me/917991901145">💬</a>

<script>
function go(id){
document.getElementById(id).scrollIntoView({behavior:'smooth'});
}
</script>

</body>
</html>
